<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QTCL &middot; Quantum Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030610;--bg2:#060c1c;--bg3:#0a1228;--card:#080e20;
  --b:rgba(0,220,255,.10);--b2:rgba(0,220,255,.18);
  --cy:#00dcff;--cy2:rgba(0,220,255,.12);
  --go:#d4a020;--go2:rgba(212,160,32,.12);
  --vi:#8040ff;--vi2:rgba(128,64,255,.12);
  --gr:#00ff9d;--gr2:rgba(0,255,157,.10);
  --dim:#3a4a68;--tx:#bbc8e0;--br:#e8f0ff;
  --mono:'JetBrains Mono',monospace;--disp:'Orbitron',sans-serif;--body:'DM Sans',sans-serif;
}
html{font-size:14px;background:var(--bg)}
body{font-family:var(--body);color:var(--tx);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:rgba(3,6,16,.97);border-bottom:1px solid var(--b2)}
.hb{display:flex;align-items:center;gap:12px}
#lc{display:block;flex-shrink:0}
.ht{font-family:var(--disp);font-size:15px;font-weight:900;letter-spacing:4px;color:var(--cy);text-shadow:0 0 18px rgba(0,220,255,.5)}
.hs{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.hr{display:flex;align-items:center;gap:20px}
#cp{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:20px;background:var(--gr2);border:1px solid rgba(0,255,157,.25);color:var(--gr)}
.cd{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1;box-shadow:0 0 6px var(--gr)}50%{opacity:.4;box-shadow:none}}
#hck{font-family:var(--mono);font-size:10px;color:var(--dim)}

#main{flex:1;padding:20px;max-width:1400px;margin:0 auto;width:100%}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pn{background:var(--card);border:1px solid var(--b);border-radius:8px;overflow:hidden}
.ph{padding:10px 16px;border-bottom:1px solid var(--b);background:rgba(0,0,0,.2);display:flex;justify-content:space-between;align-items:center}
.pht{font-family:var(--disp);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.pb{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:3px;background:var(--vi2);color:var(--vi);border:1px solid rgba(128,64,255,.2)}
.dm-panel{width:100%;height:340px;position:relative;overflow:hidden;background:#000508}
#dm-canvas{width:100%;height:100%;display:block}
.pq-hud{position:absolute;left:0;bottom:0;right:0;height:28px;background:linear-gradient(0deg,rgba(0,5,8,.92) 0%,transparent 100%);display:flex;align-items:center;padding:0 10px;gap:14px;font-family:var(--mono);font-size:9px;color:rgba(0,220,255,.55)}
.bs{display:flex;border-top:1px solid var(--b)}
.bv{flex:1;padding:10px 14px;border-right:1px solid var(--b);text-align:center}
.bv:last-child{border-right:none}
.bvl{font-size:8px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.bvn{font-family:var(--mono);font-size:13px;color:var(--vi)}
</style>
</head>
<body>
<header id="hdr">
  <div class="hb">
    <canvas id="lc" width="36" height="36"></canvas>
    <div><div class="ht">QTCL</div><div class="hs">Quantum Ledger</div></div>
  </div>
  <div class="hr">
    <div id="cp"><span class="cd"></span><span id="ct">CONNECTING</span></div>
    <div id="hck"></div>
  </div>
</header>

<div id="main">
  <div class="tc">
    <div class="pn">
      <div class="ph"><span class="pht">Density Matrix 64x64</span><span class="pb" id="dm-status">INIT</span></div>
      <div class="dm-panel">
        <canvas id="dm-canvas" width="640" height="340"></canvas>
        <div class="pq-hud">
          <span>BLOCK FIELD</span>
          <span>Fidelity: <span id="dm-fid">—</span></span>
        </div>
      </div>
      <div class="bs">
        <div class="bv"><div class="bvl">|W₃|</div><div class="bvn" id="dm-fidelity">—</div></div>
        <div class="bv"><div class="bvl">Purity</div><div class="bvn" id="dm-purity">—</div></div>
        <div class="bv"><div class="bvl">Cycle</div><div class="bvn" id="dm-cycle">—</div></div>
      </div>
    </div>
  </div>
</div>

<script src="nexus.js"></script>
<script src="matrix_worker.js"></script>
<script>
(function(){
  // LOGO ANIMATION
  const c = document.getElementById('lc');
  const ctx = c ? c.getContext('2d') : null;
  let t = 0;
  if(ctx){
    function drawLogo(){
      ctx.clearRect(0,0,36,36);
      const cx=18,cy=18,r=13,ri=7;
      ctx.strokeStyle='rgba(0,220,255,.2)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(128,64,255,.18)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2); ctx.stroke();
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2-t,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
        ctx.strokeStyle='rgba(0,220,255,.5)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
        ctx.fillStyle='rgba(0,220,255,.8)';
        ctx.beginPath(); ctx.arc(x,y,2.2,0,Math.PI*2); ctx.fill();
        const ix=cx+ri*Math.cos(a),iy=cy+ri*Math.sin(a);
        ctx.fillStyle='rgba(128,64,255,.8)';
        ctx.beginPath(); ctx.arc(ix,iy,1.5,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle='rgba(212,160,32,.95)';
      ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
      t -= 0.02;
      requestAnimationFrame(drawLogo);
    }
    drawLogo();
  }

  // CLOCK
  const hck = document.getElementById('hck');
  if(hck) setInterval(() => { hck.textContent = new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'; }, 1000);

  // NEXUS & WORKERS
  const nexus = new StreamNexus(window.location.origin + '/rpc/oracle/snapshot');
  const matrixWorker = new Worker('matrix_worker.js');
  nexus.registerWorker('matrix', matrixWorker);

  // SINK
  matrixWorker.onmessage = function(e){
    if(e.data.type === 'MATRIX_RENDER_READY'){
      const canvas = document.getElementById('dm-canvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      if(!ctx) return;
      const img = ctx.createImageData(e.data.N || 64, e.data.N || 64);
      img.data.set(e.data.pixelBuffer);
      const tc = document.createElement('canvas');
      tc.width = e.data.N || 64; tc.height = e.data.N || 64;
      tc.getContext('2d').putImageData(img, 0, 0);
      ctx.fillStyle = '#000508'; ctx.fillRect(0,0,canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tc, 8, 8, canvas.width-16, canvas.height-44);
      
      document.getElementById('dm-status').textContent = 'LIVE';
      document.getElementById('dm-fidelity').textContent = e.data.fidelity?.toFixed(4) || '—';
      document.getElementById('dm-purity').textContent = e.data.purity?.toFixed(4) || '—';
      document.getElementById('dm-fid').textContent = e.data.fidelity?.toFixed(4) || '—';
      document.getElementById('dm-cycle').textContent = e.data.cycle || '—';
    }
  };

  nexus.connect();
  document.getElementById('cp').classList.remove('off');
  document.getElementById('ct').textContent = 'LIVE';
})();
</script>
</body>
</html>
