<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QTCL &middot; Quantum Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030610;--bg2:#060c1c;--bg3:#0a1228;--card:#080e20;
  --b:rgba(0,220,255,.10);--b2:rgba(0,220,255,.18);
  --cy:#00dcff;--cy2:rgba(0,220,255,.12);
  --go:#d4a020;--go2:rgba(212,160,32,.12);
  --vi:#8040ff;--vi2:rgba(128,64,255,.12);
  --gr:#00ff9d;--gr2:rgba(0,255,157,.10);
  --re:#ff3355;--re2:rgba(255,51,85,.10);
  --dim:#3a4a68;--tx:#bbc8e0;--br:#e8f0ff;
  --mono:'JetBrains Mono',monospace;--disp:'Orbitron',sans-serif;--body:'DM Sans',sans-serif;
}
html{font-size:14px;background:var(--bg)}
body{font-family:var(--body);color:var(--tx);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:rgba(3,6,16,.97);border-bottom:1px solid var(--b2)}
.hb{display:flex;align-items:center;gap:12px}
#lc{display:block;flex-shrink:0}
.ht{font-family:var(--disp);font-size:15px;font-weight:900;letter-spacing:4px;color:var(--cy);text-shadow:0 0 18px rgba(0,220,255,.5)}
.hs{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.hr{display:flex;align-items:center;gap:20px}
#cp{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:20px;background:var(--gr2);border:1px solid rgba(0,255,157,.25);color:var(--gr)}
.cd{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1;box-shadow:0 0 6px var(--gr)}50%{opacity:.4;box-shadow:none}}
#hck{font-family:var(--mono);font-size:10px;color:var(--dim)}
#nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--b);padding:0 20px}
.tab{padding:10px 20px;font-family:var(--disp);font-size:9px;font-weight:700;color:var(--dim);cursor:pointer;transition:all .3s;border-bottom:2px solid transparent}
.tab.active{color:var(--cy);border-bottom-color:var(--cy);background:var(--cy2)}
.page{display:none;padding:20px;max-width:1400px;margin:0 auto;width:100%;flex:1}
.page.active{display:flex;flex-direction:column;gap:20px}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pn{background:var(--card);border:1px solid var(--b);border-radius:8px;overflow:hidden}
.ph{padding:10px 16px;border-bottom:1px solid var(--b);background:rgba(0,0,0,.2);display:flex;justify-content:space-between;align-items:center}
.pht{font-family:var(--disp);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.pb{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:3px;background:var(--vi2);color:var(--vi);border:1px solid rgba(128,64,255,.2)}
.dm-panel{width:100%;height:340px;position:relative;overflow:hidden;background:#000508}
#dm-canvas{width:100%;height:100%;display:block}
.pq-hud{position:absolute;left:0;bottom:0;right:0;height:28px;background:linear-gradient(0deg,rgba(0,5,8,.92) 0%,transparent 100%);display:flex;align-items:center;padding:0 10px;gap:14px;font-family:var(--mono);font-size:9px;color:rgba(0,220,255,.55)}
.bs{display:flex;border-top:1px solid var(--b)}
.bv{flex:1;padding:10px 14px;border-right:1px solid var(--b);text-align:center}
.bv:last-child{border-right:none}
.bvl{font-size:8px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.bvn{font-family:var(--mono);font-size:13px;color:var(--vi)}
</style>
</head>
<body>
<header id="hdr">
  <div class="hb">
    <canvas id="lc" width="36" height="36"></canvas>
    <div><div class="ht">QTCL</div><div class="hs">Quantum Ledger</div></div>
  </div>
  <div class="hr">
    <div id="cp"><span class="cd"></span><span id="ct">CONNECTING</span></div>
    <div id="hck"></div>
  </div>
</header>

<div id="nav">
  <div class="tab active" data-page="dashboard">DASHBOARD</div>
  <div class="tab" data-page="explorer">EXPLORER</div>
  <div class="tab" data-page="network">NETWORK</div>
</div>

<div id="dashboard" class="page active">
  <div class="tc">
    <div class="pn">
      <div class="ph"><span class="pht">Density Matrix 64x64</span><span class="pb" id="dm-status">INIT</span></div>
      <div class="dm-panel">
        <canvas id="dm-canvas" width="640" height="340"></canvas>
        <div class="pq-hud">
          <span>BLOCK FIELD</span>
          <span>Fidelity: <span id="dm-fid">—</span></span>
        </div>
      </div>
      <div class="bs">
        <div class="bv"><div class="bvl">|W₃|</div><div class="bvn" id="dm-fidelity">—</div></div>
        <div class="bv"><div class="bvl">Purity</div><div class="bvn" id="dm-purity">—</div></div>
        <div class="bv"><div class="bvl">Cycle</div><div class="bvn" id="dm-cycle">—</div></div>
      </div>
    </div>
    <div class="pn" id="mermin-module">
      <div class="ph"><span class="pht">Mermin Test</span><span class="pb" id="mermin-status">INIT</span></div>
      <div style="padding:20px;text-align:center">
        <div style="font-size:36px;font-weight:bold;color:var(--re)" id="mermin-M">—</div>
        <div style="font-size:10px;color:var(--dim);margin-top:8px" id="mermin-verdict">Awaiting...</div>
      </div>
    </div>
  </div>
  <div class="tc">
    <div class="pn">
      <div class="ph"><span class="pht">Block Chain</span><span class="pb" id="chain-height">—</span></div>
      <div style="padding:10px; max-height:200px; overflow-y:auto" id="block-chain">
        <div style="color:var(--dim); text-align:center">Loading chain...</div>
      </div>
    </div>
    <div class="pn">
      <div class="ph"><span class="pht">Peers</span><span class="pb" id="peer-count">0</span></div>
      <div style="padding:10px; max-height:200px; overflow-y:auto" id="peer-list">
        <div style="color:var(--dim); text-align:center">Scanning...</div>
      </div>
    </div>
  </div>
</div>

<div id="explorer" class="page">
  <div class="pn">
    <div class="ph"><span class="pht">Block Explorer</span><span class="pb" id="explorer-status">IDLE</span></div>
    <div style="padding:10px; max-height:500px; overflow-y:auto" id="block-list">
      <div style="color:var(--dim); text-align:center">Fetching chain data...</div>
    </div>
  </div>
</div>

<div id="network" class="page">
  <div class="pn">
    <div class="ph"><span class="pht">Nodes</span><span class="pb" id="network-status">IDLE</span></div>
    <div style="padding:20px; font-family:var(--mono); font-size:10px" id="node-list">
      <div style="color:var(--dim); text-align:center">Scanning for peers...</div>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function(e) {
    const pageId = this.getAttribute('data-page');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    this.classList.add('active');
  });
});

(function(){
  // LOGO - COUNTER-CLOCKWISE
  const c = document.getElementById('lc');
  const ctx = c ? c.getContext('2d') : null;
  let t = 0;
  if(ctx){
    function drawLogo(){
      ctx.clearRect(0,0,36,36);
      const cx=18,cy=18,r=13,ri=7;
      ctx.strokeStyle='rgba(0,220,255,.2)'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(128,64,255,.18)'; ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2); ctx.stroke();
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2-t,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
        ctx.strokeStyle='rgba(0,220,255,.5)'; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
        ctx.fillStyle='rgba(0,220,255,.8)'; ctx.beginPath(); ctx.arc(x,y,2.2,0,Math.PI*2); ctx.fill();
        const ix=cx+ri*Math.cos(a),iy=cy+ri*Math.sin(a);
        ctx.fillStyle='rgba(128,64,255,.8)'; ctx.beginPath(); ctx.arc(ix,iy,1.5,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle='rgba(212,160,32,.95)'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
      t += 0.02; // Corrected for counter-clockwise in standard canvas coords
      requestAnimationFrame(drawLogo);
    }
    drawLogo();
  }

  // CLOCK
  const hck = document.getElementById('hck');
  if(hck) setInterval(() => { hck.textContent = new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'; }, 1000);

  // RENDER FUNCTION - 64x64 direct display, no translation, yellow/red gradient
  function renderMatrix(hex, fidelity, purity, cycle){
    const canvas = document.getElementById('dm-canvas');
    if(!canvas || !hex || hex.length < 32) return;
    const ctx = canvas.getContext('2d');
    if(!ctx) return;
    
    try {
      const N = 64;
      const re = new Float64Array(N*N);
      const im = new Float64Array(N*N);
      const HEX = new Uint8Array(256);
      for(let i=0;i<10;i++)HEX[48+i]=i;
      for(let i=0;i<6;i++){HEX[65+i]=10+i;HEX[97+i]=10+i;}
      const dv = new DataView(new ArrayBuffer(8));
      const u8 = new Uint8Array(dv.buffer);
      
      // Parse 64x64 complex matrix (server always sends 64x64)
      for(let i=0;i<N*N;i++){
        const off = i*32;
        if(off+31>=hex.length) break;
        for(let b=0;b<8;b++) u8[b]=(HEX[hex.charCodeAt(off+b*2)]<<4)|HEX[hex.charCodeAt(off+b*2+1)];
        re[i]=dv.getFloat64(0,true);
        for(let b=0;b<8;b++) u8[b]=(HEX[hex.charCodeAt(off+16+b*2)]<<4)|HEX[hex.charCodeAt(off+16+b*2+1)];
        im[i]=dv.getFloat64(0,true);
      }
      
      // Compute magnitude
      const mag = new Float64Array(N*N);
      let maxMag=0;
      for(let i=0;i<N*N;i++){
        mag[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i]);
        if(mag[i]>maxMag) maxMag=mag[i];
      }
      
      // Render with yellow/red gradient
      const px = new Uint8ClampedArray(N*N*4);
      for(let i=0;i<N*N;i++){
        const t = mag[i] / (maxMag || 1); // 0..1 normalized magnitude
        // Gradient: dark blue (0) → red (0.5) → yellow (1.0)
        let r, g, b;
        if(t < 0.5){
          // Dark blue to red
          r = Math.floor(t * 2 * 255);
          g = 0;
          b = Math.floor((1 - t * 2) * 80);
        } else {
          // Red to yellow
          r = 255;
          g = Math.floor((t - 0.5) * 2 * 255);
          b = 0;
        }
        const p=i*4;
        px[p]=r; px[p+1]=g; px[p+2]=b; px[p+3]=255;
      }
      
      // Draw 64x64 image scaled to canvas
      const img = new ImageData(px, N, N);
      const tc = document.createElement('canvas');
      tc.width=N;tc.height=N;
      tc.getContext('2d').putImageData(img,0,0);
      ctx.fillStyle='#000508';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.imageSmoothingEnabled=false;
      ctx.drawImage(tc,8,8,canvas.width-16,canvas.height-44);
      
      document.getElementById('dm-status').textContent = 'LIVE';
      document.getElementById('dm-fidelity').textContent = fidelity?.toFixed(4) || '—';
      document.getElementById('dm-purity').textContent = purity?.toFixed(4) || '—';
      document.getElementById('dm-fid').textContent = fidelity?.toFixed(4) || '—';
      document.getElementById('dm-cycle').textContent = cycle ?? '—';
    } catch (e) {
      console.error('Render Error:', e);
      document.getElementById('dm-status').textContent = 'RENDER ERR';
    }
  }

  // SSE using EventSource for real-time streams
  let snapshotSource;
  
  function connectSSE(){
    snapshotSource = new EventSource('/rpc/oracle/snapshot');
    snapshotSource.onmessage = function(e) {
      try {
        const data = JSON.parse(e.data);
        const r = data.result || data;
        
        // DM → heatmap
        if(r.density_matrix_hex){
          renderMatrix(r.density_matrix_hex, r.w_state_fidelity, r.purity, r.lattice_refresh_counter);
        }
        
        // Metrics → gauges
        if(r.w_state_fidelity !== undefined){
          document.getElementById('dm-fidelity').textContent = r.w_state_fidelity?.toFixed(4) || '—';
          document.getElementById('dm-fid').textContent = r.w_state_fidelity?.toFixed(4) || '—';
        }
        if(r.purity !== undefined){
          document.getElementById('dm-purity').textContent = r.purity?.toFixed(4) || '—';
        }
        
        // Mermin → display
        if(r.mermin_test){
          const M = r.mermin_test.M ?? r.mermin_test.value ?? 0;
          document.getElementById('mermin-status').textContent = 'LIVE';
          document.getElementById('mermin-M').textContent = M.toFixed(3);
          const verdict = M > 2.0 ? 'ENTANGLED' : M < -2.0 ? 'ENTANGLED' : 'SEPARABLE';
          document.getElementById('mermin-verdict').textContent = verdict;
        }
        
        // Cycle
        if(r.lattice_refresh_counter !== undefined){
          document.getElementById('dm-cycle').textContent = r.lattice_refresh_counter ?? '—';
        }
      } catch(e){console.log('SSE parse error', e);}
    };
    snapshotSource.onerror = function(){};
  }
  
  // Explorer - fetch recent blocks with in-depth info
  function updateExplorer(){
    fetch('/rpc', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({jsonrpc: '2.0', method: 'qtcl_getBlockRange', params: [-20, -1], id: 1})
    }).then(r => r.json()).then(res => {
      if(res.result && res.result.blocks){
        const blocks = res.result.blocks;
        const list = document.getElementById('block-list');
        list.innerHTML = blocks.reverse().map(b => 
          '<div style="border:1px solid var(--b);border-radius:4px;padding:8px;margin-bottom:8px;font-family:var(--mono);font-size:9px;color:var(--tx)">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
          '<span style="color:var(--cy);font-weight:bold">Block #' + b.height + '</span>' +
          '<span style="color:var(--dim)">' + new Date(b.timestamp*1000).toISOString().slice(0,19) + ' UTC</span>' +
          '</div>' +
          '<div style="margin-bottom:3px"><span style="color:var(--dim)">Hash:</span> <span style="color:var(--go);word-break:break-all">' + (b.block_hash||'—') + '</span></div>' +
          '<div style="margin-bottom:3px"><span style="color:var(--dim)">Parent:</span> <span style="color:var(--vi);word-break:break-all">' + (b.parent_hash||'genesis') + '</span></div>' +
          '<div style="display:flex;justify-content:space-between">' +
          '<span style="color:var(--gr)">QF: ' + ((b.quantum_fidelity||0).toFixed(4)) + '</span>' +
          '<span style="color:var(--dim)">PQ: ' + (b.pq_curr||'—') + '</span>' +
          '<span style="color:var(--dim)">Txns: ' + (b.transaction_count||0) + '</span>' +
          '</div>' +
          '</div>'
        ).join('') || '<div style="color:var(--dim);text-align:center">No blocks found</div>';
        document.getElementById('explorer-status').textContent = 'LIVE';
      }
    }).catch(() => {
      document.getElementById('explorer-status').textContent = 'ERR';
    });
  }

  // Network - fetch peers and count
  function updateNetwork(){
    fetch('/rpc', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({jsonrpc: '2.0', method: 'qtcl_getPeers', params: [50], id: 1})
    }).then(r => r.json()).then(res => {
      const peers = res.result?.peers || [];
      const list = document.getElementById('node-list');
      if(list) list.innerHTML = peers.map(p => 
        '<div style="border-bottom:1px solid var(--b);padding:4px 0;display:flex;justify-content:space-between;color:var(--tx)">' +
        '<span>'+(p.peer_id||p.node_id||'').slice(0,12)+'...</span>' +
        '<span style="color:var(--vi)">'+(p.address||p.external_addr||'unknown')+'</span>' +
        '<span>H:'+(p.chain_height||0)+'</span></div>'
      ).join('') || '<div style="color:var(--dim);text-align:center">No peers</div>';
      document.getElementById('network-status').textContent = 'LIVE';
      document.getElementById('peer-count').textContent = peers.length;
    }).catch(() => {
      document.getElementById('network-status').textContent = 'ERR';
    });
  }

  // Block chain - fetch recent blocks with hashes and parent hashes
  function updateBlockChain(){
    fetch('/rpc', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({jsonrpc: '2.0', method: 'qtcl_getBlockRange', params: [-10, -1], id: 1})
    }).then(r => r.json()).then(res => {
      if(res.result && res.result.blocks){
        const blocks = res.result.blocks;
        const list = document.getElementById('block-chain');
        list.innerHTML = blocks.reverse().map((b, i) => 
          '<div style="border-bottom:1px solid var(--b);padding:6px 0;font-family:var(--mono);font-size:9px;color:var(--tx)">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:2px">' +
          '<span style="color:var(--cy);font-weight:bold">H:' + b.height + '</span>' +
          '<span style="color:var(--dim)">' + (b.block_hash||'').slice(0,16) + '...</span>' +
          '</div>' +
          '<div style="color:var(--dim);font-size:8px">' +
          'Parent: ' + (b.parent_hash||'genesis').slice(0,20) + '...' +
          '</div>' +
          '</div>'
        ).join('');
        document.getElementById('chain-height').textContent = blocks.length > 0 ? blocks[blocks.length-1].height : '—';
      }
    }).catch(() => {});
  }
  
  updateBlockChain();
  setInterval(updateBlockChain, 5000);
  
  connectSSE();
  updateExplorer();
  updateNetwork();
  setInterval(updateExplorer, 5000);
  setInterval(updateNetwork, 5000);
  
  document.getElementById('cp').classList.remove('off');
  document.getElementById('ct').textContent = 'LIVE';
})();
</script>
</body>
</html>
